<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Inventario</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .form-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .form-container input {
      padding: 10px;
      margin-right: 10px;
      font-size: 16px;
    }
    .form-container button {
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Consulta de Inventario</h1>
  
  <div class="form-container">
    <input type="text" id="producto" placeholder="Producto" />
    <input type="text" id="talla" placeholder="Talla (S, M, L, XL)" />
    <button onclick="consultarInventario()">Consultar</button>
  </div>


  <div class="result" id="resultado"></div>


  <script src="consultarInventario.js"></script>
</body>
</html>
